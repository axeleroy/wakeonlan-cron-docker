name: Docker publish tagged version

on:
    workflow_dispatch:
    push:
        tags:
            - 'v[0-9].[0-9]+.[0-9]+'
        branches:
            - main
        paths:
            - Dockerfile
            - entrypoint.sh

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
            -   name: Install jq
                run: sudo apt install jq -y
            -   name: Get tag
                id: get_tag
                run: |
                    TAG=$(curl https://api.github.com/repos/axeleroy/wakeonlan-cron-docker/releases/latest | jq -r '.tag_name')
                    echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            -   name: Set up QEMU
                uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
            -   name: Docker meta
                id: meta
                uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
                with:
                    images: |
                        axeleroy/wakeonlan-cron-docker
                        ghcr.io/axeleroy/wakeonlan-cron-docker
                    tags: type=semver,pattern={{version}},value=${{ steps.get_tag.outputs.tag }}
            -   name: Login to DockerHub
                uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
                with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}
            -   name: Login to GitHub Container Registry
                uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Build and push
                uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
                with:
                    push: true
                    platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7,linux/386,linux/ppc64le,linux/s390x
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
